# RC 자동주행 로컬 설정 파일 템플릿입니다.
# 이 파일을 참고해서 rc_control.ini가 자동 생성됩니다.
# 실제 런타임은 config/rc_control.ini만 읽고, 이 파일은 git에 유지합니다.

[mqtt]
host = 192.168.100.10
port = 1883
goal_topic = wiserisk/rc/goal
pose_topic = wiserisk/p1/pose
safety_topic = wiserisk/rc/safety
status_topic = wiserisk/rc/status
status_publish_interval_ms = 50

[control]
k_linear = 0.5
k_yaw = 0.8
max_speed_mps = 0.70
max_yaw_rate_rps = 0.5
tolerance_m = 0.10

[motor]
track_width_m = 0.22
wheel_max_speed_mps = 0.70
speed_deadband_mps = 0.003
pwm_min_effective = 110
pwm_max = 220
