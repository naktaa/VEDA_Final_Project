# 하이브리드 EIS 로컬 설정 파일 템플릿입니다.
# 이 파일을 참고해서 config_local.ini를 만들고 로컬에서만 수정해서 사용하세요.
# config_local.ini는 git에 올라가지 않습니다.
# 런타임은 config_local.ini만 읽습니다. main은 CLI 파라미터를 받지 않도록 구성했습니다.

[camera]
# width/height: 출력 및 처리 해상도입니다. 낮출수록 처리 부담과 무선 부담이 줄어듭니다.
width=640
height=480
# fps/frame_duration_us: 서로 맞는 값으로 유지해야 합니다. 20fps는 대략 50000us입니다.
fps=20
frame_duration_us=50000
# exposure_us: 짧게 줄일수록 블러가 줄어 EIS에 유리하지만 영상이 어두워지고 노이즈가 늘 수 있습니다.
# 밝은 환경이면 8000~10000us부터 시작하는 편이 좋고, 20000us는 진동 환경에서 대체로 긴 편입니다.
exposure_us=12000
# flip=1이면 캡처 후 180도 뒤집습니다.
flip=1
# hfov/vfov: 자이로 회전 warp 계산에 사용합니다. 값이 틀리면 gyro 보정량이 과하거나 부족해질 수 있습니다.
hfov_deg=62.2
vfov_deg=48.8
# libcamera_xrgb: 색 채널이 뒤바뀌어 보일 때만 바꿉니다.
libcamera_xrgb=0
# capture_backend: libcamera(기본) 또는 gstreamer. 색상/지연 비교 테스트용입니다.
capture_backend=libcamera

[imu]
# MPU-6050 계열 IMU의 I2C bus/address 설정입니다.
bus=1
addr=104
# int_gpio_chip/int_line_offset: DATA READY 인터럽트에 연결한 gpiochip 장치와 line offset입니다.
# 라즈베리파이 기본 GPIO는 보통 /dev/gpiochip0 이고, BCM GPIO 번호를 line offset으로 쓰면 됩니다.
int_gpio_chip=/dev/gpiochip0
int_line_offset=17
# int_pin_wpi: 예전 wiringPi 번호 설정용 legacy fallback입니다. 새 설정에서는 int_line_offset만 쓰는 편이 낫습니다.
int_pin_wpi=-1
# target_hz: 높을수록 고주파 진동 추적에 유리합니다. 500Hz를 기본 시작점으로 잡았습니다.
target_hz=500
# use_fifo: 1이면 FIFO 경로를 우선 사용합니다. 특별히 raw polling을 확인할 게 아니면 켜두는 편이 좋습니다.
use_fifo=1
# gyro_sensitivity: raw count를 각속도로 바꾸는 스케일입니다. MPU-6050에서 +/-250dps면 131.0이 맞습니다.
gyro_sensitivity=131
# axis/sign mapping: yaw/roll/pitch 방향이 실제와 안 맞을 때만 수정합니다.
# axis_*는 raw gx/gy/gz 중 무엇을 쓸지 0/1/2로 고르고, sign_*는 방향을 뒤집습니다.
axis_roll=2
axis_pitch=0
axis_yaw=1
sign_roll=1
sign_pitch=-1
sign_yaw=-1

[eis]
# LK feature 수입니다. 올리면 특징점 부족 장면에 도움이 될 수 있지만 CPU 부담이 커집니다.
lk_max_features=180
# LK minimum surviving features/inliers입니다. 낮추면 더 쉽게 통과하고, 높이면 더 보수적으로 동작합니다.
lk_min_features=12
lk_min_inliers=10
# LK feature detection quality/min distance입니다.
# quality를 낮추거나 min_dist를 낮추면 점은 더 많이 잡히지만 노이즈도 늘 수 있습니다.
lk_quality=0.01
lk_min_dist=24
# LK affine 추정용 RANSAC threshold입니다. 너무 키우면 outlier를 많이 받아 drift가 늘 수 있습니다.
lk_ransac_thresh=2.5
# LK confidence gate입니다. 이 값보다 낮으면 visual anchor와 translation 신뢰도를 줄입니다.
lk_confidence_gate=0.55
# LK translation smoothing입니다. alpha를 높이면 더 부드럽지만 지연도 늘어납니다.
lk_translation_alpha=0.55
# 프레임당 LK translation correction 최대값(px)입니다. 너무 크게 올리면 화면이 튈 수 있습니다.
lk_translation_max_corr_px=20
# TURN_FOLLOW 상태에서 translation을 얼마나 줄일지 정하는 값입니다. 낮출수록 회전을 더 따라갑니다.
lk_translation_turn_scale=0.60
# LK rotation anchor의 저역 필터 계수입니다. 높일수록 더 천천히, 더 안정적으로 따라갑니다.
lk_rotation_anchor_alpha=0.92
# LK rotation anchor gain입니다. gyro rotation과 싸우지 않도록 보통 낮게 두는 편이 좋습니다.
lk_rotation_gain=0.18

# 축별 gyro gain입니다. RC카 용도에서는 보통 roll/pitch를 yaw보다 크게 두는 편입니다.
gyro_gain_roll=1.20
gyro_gain_pitch=1.20
gyro_gain_yaw=0.45
# gyro correction clamp입니다. 보정이 명확히 약하다고 느껴질 때만 조금씩 올리는 편이 안전합니다.
gyro_max_roll_deg=5.0
gyro_max_pitch_deg=4.0
gyro_max_yaw_deg=8.0
# high-pass용 LPF alpha입니다. 높이면 더 빠른 진동만 남고, 낮추면 더 많은 움직임이 보정에 들어옵니다.
# 진동에 둔하게 느껴지면 조금 낮추고, 과하게 반응하면 높여보면 됩니다.
gyro_hp_lpf_alpha=0.90
gyro_hp_gain_roll=1.0
gyro_hp_gain_pitch=1.0
gyro_hp_gain_yaw=1.0
# 큰 회전 보호 로직입니다. 프레임 간 회전이 threshold를 넘으면 gyro correction을 줄여서
# 급회전 시 검은 여백/검은 화면이 심해지는 걸 막습니다.
gyro_large_rot_thresh_deg=3.5
gyro_large_rot_gain_scale=0.40

# crop budget입니다. 올리면 더 큰 보정을 숨길 수 있지만 화각 손실이 커집니다.
crop_budget_percent=18.0
# turn detection threshold입니다. enter 값을 낮추면 TURN_FOLLOW로 더 쉽게 들어갑니다.
turn_enter_yaw_rate_dps=42.0
turn_exit_yaw_rate_dps=18.0
# turn mode 진입/이탈에 필요한 프레임 수입니다. 높이면 덜 민감하지만 전환이 느려집니다.
turn_hold_frames=3
# TURN_FOLLOW 종료 후 복귀 프레임 수입니다. 높이면 더 부드럽지만 다시 안정화되는 속도는 느려집니다.
recover_frames=12
# 회전을 따라가는 동안 correction을 얼마나 줄일지 정합니다. 낮을수록 자연스럽게 따라가고, 안정화는 약해집니다.
turn_follow_correction_scale=0.25
# 출력 영상에 디버그 오버레이를 표시할지 여부입니다.
debug_overlay=0

[rtsp]
# RTSP 포트와 mount path입니다.
port=8555
path=/cam
raw_path=/raw
# bitrate: 5GHz 기준 640x480@20fps에서는 2.5Mbps 정도가 지연과 화질 균형이 무난합니다.
bitrate=2500000
# iframe_period: 20fps 기준 20이면 대략 1초마다 I-frame입니다.
iframe_period=20

[mqtt]
# 탱크 주행 제어와 auto goal/pose/status에 공통으로 쓰는 MQTT broker 설정입니다.
host=192.168.100.7
port=1883
keepalive_sec=30
control_topic=wiserisk/rc/control
goal_topic=wiserisk/rc/goal
pose_topic=wiserisk/p1/pose
safety_topic=wiserisk/rc/safety
status_topic=wiserisk/rc/status
status_publish_interval_ms=50

[auto]
# 자동 추종 제어 gain과 제한값입니다.
k_linear=0.5
k_yaw=0.8
max_speed_cmps=70.0
max_yaw_rate_rps=0.5
tolerance_cm=10.0
# rotate_yaw_offset_deg: 제자리 회전 중 정렬 deadzone입니다.
rotate_yaw_offset_deg=5.0

[motor]
# auto 모드에서 선속도/각속도를 좌우 바퀴 PWM으로 바꿀 때 쓰는 값입니다.
track_width_cm=22.0
wheel_max_speed_cmps=70.0
speed_deadband_cmps=0.3
pwm_min_effective=110
pwm_max=220

[manual]
# Qt/controller 수동 조작 기본 PWM입니다.
default_pwm=200

[controller]
# enabled=0이면 evdev 컨트롤러 입력을 끕니다.
enabled=1
# input_device를 비워두면 device_name_hint로 /dev/input/event*를 탐색합니다.
input_device=
device_name_hint=VR-PARK
idle_stop_ms=180
speed_step=10
log_only=0

[http]
# 폰에서 보는 tiltVR 웹/MJPEG 서버입니다.
enable=1
port=8000
# build 디렉터리에서 실행하므로 기본값은 소스 트리의 web 자산을 가리킵니다.
web_root=../web/tilt_vr

[ptz]
# PCA9685 + SG90 팬틸트 설정입니다.
i2c_device=/dev/i2c-1
i2c_address=64
pwm_frequency_hz=50
pan_channel=0
tilt_channel=1
pan_center_deg=90
pan_left_deg=180
pan_right_deg=0
tilt_center_deg=90
tilt_up_deg=0
tilt_down_deg=180
imu_timeout_ms=300

[calib]
# 정지 상태에서 측정한 raw gyro bias count입니다. calib_offset가 자동으로 갱신합니다.
bias_x=0
bias_y=0
bias_z=0
# IMU와 카메라 사이 time offset(ms)입니다. calib_offset가 추정해서 저장합니다.
imu_offset_ms=0
# 현재 런타임은 sensor timestamp 기준을 사용하도록 가정합니다.
ts_source=sensor
last_calibration=never
# bias를 측정할 정지 구간 길이(ms)입니다.
bias_duration_ms=2500
# calib_offset가 LK/gyro 움직임을 기록할 시간(ms)입니다.
sweep_duration_ms=8000
# imu_offset_ms 추정용 coarse/fine sweep 범위입니다.
# 범위를 넓히면 느려지지만 타이밍 차이를 모를 때는 더 안전합니다.
coarse_range_ms=50
coarse_step_ms=0.5
fine_range_ms=5
fine_step_ms=0.1
