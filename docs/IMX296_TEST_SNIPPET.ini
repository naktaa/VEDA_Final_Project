# IMX296 Global Shutter 테스트용 snippet
# 이 파일은 런타임이 직접 읽는 preset이 아닙니다.
# 필요한 값만 config_local.ini에 반영해서 사용하세요.

[camera]
width=640
height=480
fps=20
frame_duration_us=50000
# global shutter smoke test 시작값
exposure_us=8000
capture_backend=libcamera
# 렌즈 정보가 아직 없으므로 임시 placeholder입니다.
# 내일 렌즈 초점거리 확인 후 실제 값으로 갱신하세요.
hfov_deg=50.0
vfov_deg=38.0

[eis]
# rolling shutter 자체 차이를 보기 위한 초기 비교에서는 off 유지
rs_mode=off

[calib]
# 센서/렌즈 교체 후에는 최종 비교 전에 calib 재실행 권장
imu_offset_ms=0
